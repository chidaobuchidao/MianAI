# 云托管环境配置（覆盖 application.yml）
server:
  port: 80

spring:
  datasource:
    url: jdbc:mysql://${CLOUD_MYSQL_HOST}:${CLOUD_MYSQL_PORT:3306}/ai-interview?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # 云端暂时不用 Redis（没有就置空）
  redis:
    host: ${REDIS_HOST:}
    port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 关闭 Swagger/Knife4j（生产环境不暴露 API 文档）
springdoc:
  api-docs:
    enabled: false
knife4j:
  enable: false
