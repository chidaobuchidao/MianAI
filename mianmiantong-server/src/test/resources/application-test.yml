server:
  port: 0

spring:
  application:
    name: mianmiantong-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: test-secret-key-for-testing-only-32chars!
  expiration: 604800000

ai:
  provider: deepseek
  deepseek:
    api-key: test-deepseek-key
    model: deepseek-v4-flash
    endpoint: https://api.deepseek.com/chat/completions
  qwen:
    api-key: test-qwen-key
    model: qwen-turbo
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  doubao:
    api-key: test-doubao-key
    model: doubao-pro-4k
    endpoint: https://ark.cn-beijing.volces.com/api/v3/chat/completions
  zhipu:
    api-key: test-zhipu-key
    model: glm-4-flash
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
