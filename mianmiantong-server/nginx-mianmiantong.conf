# 面面通 — Nginx 配置（前端 H5 + 后端 API 反代）
# 宝塔：网站 → 添加站点 → 配置文件 中粘贴
# H5 文件放到 /www/wwwroot/mianmiantong/

server {
    listen 80;
    server_name 8.148.15.228;

    # 日志
    access_log /www/wwwlogs/mianmiantong-access.log;
    error_log /www/wwwlogs/mianmiantong-error.log;

    # 上传大小限制（简历文件）
    client_max_body_size 20m;

    # API 请求反代到后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE 支持（AI 面试流式对话 + 代码审查长连接）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 360s;
        proxy_connect_timeout 10s;
        # SSE 流式响应禁用缓冲，确保逐 token 实时推送
        proxy_buffering off;
        proxy_cache off;
    }

    # 前端 H5 静态文件
    root /www/wwwroot/mianmiantong;
    index index.html;

    # Vue Router history 模式：非文件路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
